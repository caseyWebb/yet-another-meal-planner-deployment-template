# discovery_sources.toml — inbound-newsletter allowlist (shared, data-repo root).
# The trust gate for inbound-email discovery: only mail from a listed source is
# processed. Two entry kinds:
#   [[members]] — friend-group personal addresses; ANYTHING they forward gets indexed.
#   [[senders]] — newsletter `From` addresses; auto-forwarded mail from them gets indexed.
# Widen later via update_discovery_sources (anyone trusted with the MCP can add).
# Every entry needs a valid `address` (must contain @). Start empty, add your own.
#
# [[members]]
# address = "you@example.com"          # required, must contain @
# name = "You"                         # optional label
#
# [[senders]]
# address = "cooking@nytimes.com"
# name = "NYT Cooking"
