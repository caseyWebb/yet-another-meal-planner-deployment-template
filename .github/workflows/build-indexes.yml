# Regenerate _indexes/ when recipes change. The actual build logic lives in the
# code repo (caseyWebb/groceries-agent) as a reusable workflow — this is just a
# thin caller, so the build scripts are never copied into this data repo. This run
# is billed to THIS repo's owner, not the code repo's. Pin @main to a release tag
# (e.g. @v1) if you prefer stability over auto-updates.
name: build-indexes

on:
  push:
    paths:
      - "recipes/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-indexes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    uses: caseyWebb/groceries-agent/.github/workflows/data-build-indexes.yml@main
