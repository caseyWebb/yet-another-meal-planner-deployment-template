# Build the public cookbook site and deploy it to THIS repo's GitHub Pages. The
# build logic is a reusable workflow in the code repo (caseyWebb/groceries-agent);
# this is a thin caller. Publishing public Pages from a private repo requires
# GitHub Pro. The site renders ONLY recipes/ — never users/ — so no personal data
# is exposed. Billed to THIS repo's owner.
name: build-site

on:
  push:
    paths:
      - "recipes/**"
      - "ready_to_eat/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    uses: caseyWebb/groceries-agent/.github/workflows/data-build-site.yml@main
