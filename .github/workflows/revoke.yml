# Revoke a member — remove their allowlist entry + invite code from TENANT_KV so
# they can no longer authorize and their issued token stops resolving. Thin caller
# of the code repo's reusable workflow; runs in THIS private repo.
#
# Requires on this repo: secret CLOUDFLARE_API_TOKEN, variable TENANT_KV_ID.
name: Revoke member

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Username to revoke"
        required: true
      invite_code:
        description: "Their invite code to delete (optional)"
        required: false

jobs:
  revoke:
    uses: caseyWebb/groceries-agent/.github/workflows/data-revoke.yml@main
    secrets: inherit # passes CLOUDFLARE_API_TOKEN
    with:
      username: ${{ inputs.username }}
      invite_code: ${{ inputs.invite_code }}
      tenant_kv_id: ${{ vars.TENANT_KV_ID }}
