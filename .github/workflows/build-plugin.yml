# Build YOUR grocery-agent plugin bundle with YOUR Worker URL baked in, as a
# downloadable artifact you upload to claude.ai (Customize -> upload a custom plugin
# file). The build logic is a reusable workflow in the code repo; this is a thin
# caller. Build-only — NO secrets. Billed to THIS repo's owner.
#
# Use this if you self-host and don't want to fork the code repo: the published
# marketplace plugin bakes the upstream operator's Worker URL (and isn't open for
# signups), so mint your own baked bundle here. On a later upstream update, re-run
# **Deploy Worker FIRST**, then re-run this and re-upload — your skills must not get
# ahead of the tools your Worker serves.
#
# Optional on this repo (Settings -> Secrets and variables -> Actions):
#   Variable: WORKER_HOST   (e.g. grocery-mcp.<you>.workers.dev) — used to default mcp_url
name: Build plugin

on:
  workflow_dispatch:
    inputs:
      mcp_url:
        description: "Your grocery-mcp connector URL (blank = https://<WORKER_HOST>/mcp)"
        required: false
      code_ref:
        description: "Ref of caseyWebb/groceries-agent to build from"
        required: false
        default: main

jobs:
  build-plugin:
    uses: caseyWebb/groceries-agent/.github/workflows/data-build-plugin.yml@main
    with:
      mcp_url: ${{ inputs.mcp_url || format('https://{0}/mcp', vars.WORKER_HOST) }}
      code_ref: ${{ inputs.code_ref || 'main' }}
