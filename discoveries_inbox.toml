# discoveries_inbox.toml — recipe candidates from forwarded newsletters (shared,
# data-repo root). Agent-writable SIDE-EFFECT file, NOT user-curated: the Worker's
# inbound-email handler (email()) appends entries as newsletters forwarded to
# groceries-agent@<your-domain> arrive; the agent reads them via
# read_discovery_inbox. Candidate `url`s are stored already unwrapped to clean
# canonical form. Leave this empty — it populates itself. An absent file is valid.
#
# [[entries]]
# from = "news@seriouseats.com"
# subject = "This week's best dinners"
# received_at = "2026-06-11"            # YYYY-MM-DD from the message Date header (or "")
#   [[entries.candidates]]
#   title = "Weeknight Chili"
#   summary = ""                        # reserved; v0 leaves empty
#   url = "https://www.seriouseats.com/weeknight-chili"   # required, unwrapped + canonical
