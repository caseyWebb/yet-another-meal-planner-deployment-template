# flyer_terms.toml — broad scan terms for kroger_flyer's serendipitous sale
# discovery (shared, user-curated). A flat top-level `terms` array of strings that
# WIDENS the net past the precise terms derived from caller context (current menu
# ingredients, stockup.toml, substitution candidates). Absent or empty degrades
# gracefully — the flyer scan still runs on the precise terms. The agent may
# suggest additions during a scan, but edits this only when directed.
